<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amazon Label Cropper</title>
    <link rel="stylesheet" href="styles.css?v=4" />
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workbench" aria-labelledby="app-title">
        <div class="header-row">
          <div>
            <p class="eyebrow">PDF label tool</p>
            <h1 id="app-title">Amazon Label Cropper</h1>
          </div>
          <button id="downloadButton" class="download" type="button" disabled>
            Download cropped PDF
          </button>
        </div>

        <div class="tool-grid">
          <div class="panel upload-panel">
            <label class="drop-zone" for="pdfFile">
              <input id="pdfFile" type="file" accept="application/pdf,.pdf" />
              <span class="drop-title">Choose Amazon shipping PDF</span>
              <span class="drop-copy">Each source page is split into the top-left and bottom-left shipping labels. Invoice sections on the right are ignored.</span>
              <span id="fileName" class="file-name">No file selected</span>
            </label>

            <div class="controls" aria-label="Crop controls">
              <div class="control-row">
                <label for="cropPreset">Source layout</label>
                <select id="cropPreset">
                  <option value="left-half" selected>Labels on left, invoices on right</option>
                  <option value="right-half">Labels on right, invoices on left</option>
                  <option value="top-half">Labels on top row</option>
                  <option value="bottom-half">Labels on bottom row</option>
                </select>
              </div>

              <div class="control-row">
                <label for="pageSize">Output size</label>
                <select id="pageSize">
                  <option value="4x6" selected>4 x 6 in thermal label</option>
                  <option value="source">Use cropped label size</option>
                  <option value="a6">A6 page</option>
                </select>
              </div>

              <div class="control-row">
                <label for="fitMode">Fit</label>
                <select id="fitMode">
                  <option value="contain" selected>Fit full label</option>
                  <option value="cover">Fill page</option>
                </select>
              </div>

              <div class="check-row">
                <input id="includeInvoiceText" type="checkbox" checked />
                <label for="includeInvoiceText">Paste invoice product section</label>
              </div>

              <div class="control-row">
                <label for="sectionStartPercent">Invoice section start</label>
                <div class="range-line">
                  <input id="sectionStartPercent" type="range" min="0" max="75" step="1" value="32" />
                  <output id="sectionStartValue" for="sectionStartPercent">32%</output>
                </div>
              </div>

              <div class="control-row">
                <label for="sectionHeightPercent">Invoice section height</label>
                <div class="range-line">
                  <input id="sectionHeightPercent" type="range" min="12" max="60" step="1" value="34" />
                  <output id="sectionHeightValue" for="sectionHeightPercent">34%</output>
                </div>
              </div>

              <div class="control-row">
                <label for="leftPercent">Left label width</label>
                <div class="range-line">
                  <input id="leftPercent" type="range" min="40" max="60" step="0.5" value="50" />
                  <output id="leftPercentValue" for="leftPercent">50%</output>
                </div>
              </div>

              <div class="control-row">
                <label for="marginPercent">Inner margin trim</label>
                <div class="range-line">
                  <input id="marginPercent" type="range" min="0" max="8" step="0.25" value="1" />
                  <output id="marginPercentValue" for="marginPercent">1%</output>
                </div>
              </div>

              <div class="check-row">
                <input id="skipBlank" type="checkbox" checked />
                <label for="skipBlank">Skip empty-looking labels</label>
              </div>
            </div>

            <button id="cropButton" class="primary-button" type="button" disabled>Crop labels</button>
          </div>

          <div class="panel result-panel">
            <div class="status-card" aria-live="polite">
              <span id="statusText">Waiting for a PDF.</span>
              <span id="detailText">Upload the official Amazon 2-label-per-page file to begin.</span>
            </div>
            <div class="preview-frame">
              <iframe id="pdfPreview" title="Cropped PDF preview"></iframe>
              <div id="emptyPreview" class="empty-preview">Cropped PDF preview appears here.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=4"></script>
  </body>
</html>
